# Netlify configuration for ORICHALCUM B2B site

# Build settings (static site, no build needed)
[build]
  publish = "."

# Redirects — index.html for root
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers — images
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
